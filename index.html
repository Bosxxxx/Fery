<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗 Validator Social Hub</title>
  <!-- Ethers.js untuk integrasi Web3 nanti -->
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f111a;
      --bg-card: #1a1d2d;
      --text-primary: #e0e6f0;
      --text-secondary: #8b94b0;
      --accent: #4f8cff;
      --accent-hover: #3a6fd8;
      --success: #22c55e;
      --border: #2a2f45;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      padding-bottom: 40px;
    }

    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--text-secondary); font-weight: 400; margin-left: 8px; }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .container {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
    }

    .sidebar {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      height: fit-content;
      border: 1px solid var(--border);
    }

    .avatar {
      width: 80px; height: 80px;
      background: #2a304a;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--text-secondary);
    }

    .stat { margin: 12px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
    .stat span:first-child { color: var(--text-secondary); }
    .stat span:last-child { font-weight: 600; }

    .feed { background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
    .section-title { font-size: 1.2rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

    .create-post { margin-bottom: 24px; }
    .create-post textarea {
      width: 100%; background: #121520; border: 1px solid var(--border);
      color: var(--text-primary); padding: 12px; border-radius: 8px;
      resize: vertical; min-height: 80px; margin-bottom: 12px;
    }
    .post-options { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .file-input { display: none; }
    .file-label {
      background: #1e2235; padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; border: 1px dashed var(--border);
    }
    .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }

    .post-card {
      background: #151826; border-radius: 10px; padding: 16px; margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .post-author { font-weight: 600; }
    .post-time { font-size: 0.8rem; color: var(--text-secondary); margin-left: auto; }
    .post-content { margin: 12px 0; }
    .post-image { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
    .post-actions { display: flex; gap: 16px; margin-top: 12px; font-size: 0.9rem; color: var(--text-secondary); }
    .action-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
    .action-btn:hover { color: var(--accent); }
    .action-btn.liked { color: #ff4757; }
    
    .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
    .comments-section.show { display: block; }
    .comment { padding: 6px 0; font-size: 0.85rem; }
    .comment strong { color: var(--accent); }
    .comment-input { width: 100%; background: #0f111a; border: 1px solid var(--border); padding: 8px; border-radius: 6px; margin-top: 8px; }

    .badge { background: #2d3748; color: #a0aec0; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin-left: 8px; }
    .badge.update { background: #1e3a5f; color: #63b3ed; }
    .badge.achievement { background: #322659; color: #b794f4; }
    .badge.incident { background: #5c2020; color: #f56565; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { margin-bottom: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🔗 Validator social Hub <span>Internal Network</span></div>
  <button id="connectWallet" class="btn">🔗 Connect MasterNode</button>
</header>

<div class="container">
  <!-- SIDEBAR PROFILE -->
  <aside class="sidebar">
    <div class="avatar">👤</div>
    <h3 style="text-align: center; margin-bottom: 4px;">fajarr</h3>
    <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 16px;">Node Operator • 99.98% Uptime</p>
    <div class="stat"><span>Reputation</span><span id="repScore">142</span></div>
    <div class="stat"><span>Posts</span><span id="postCount">3</span></div>
    <div class="stat"><span>Total Likes</span><span id="totalLikes">28</span></div>
    <p style="margin-top: 16px; font-size: 0.8rem; color: var(--text-secondary);">
      ✅ Terverifikasi oleh Validator Registry<br>
      🔐 Akses eksklusif jaringan
    </p>
  </aside>

  <!-- MAIN FEED -->
  <main class="feed">
    <div class="create-post">
      <textarea id="postContent" placeholder="Bagikan update node, insight, atau diskusi..."></textarea>
      <img id="previewImg" class="preview-img" alt="Preview">
      <div class="post-options">
        <label class="file-label">
          📷 Tambah Foto
          <input type="file" id="imageInput" class="file-input" accept="image/*">
        </label>
        <select id="postType" style="background: #1e2235; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px;">
          <option value="update">📢 Update</option>
          <option value="achievement">🏆 Achievement</option>
          <option value="incident">⚠️ Incident</option>
          <option value="discussion">💬 Diskusi</option>
        </select>
        <button id="publishBtn" class="btn">📤 Publish</button>
      </div>
    </div>

    <h3 class="section-title">📜 Feed Validator</h3>
    <div id="postsContainer">
      <!-- Posts akan dirender di sini oleh JS -->
    </div>
  </main>
</div>

<script>
  // === STATE LOKAL (Simulasi Database) ===
  let currentUser = { address: null, reputation: 142, posts: 0, likes: 28 };
  let posts = [
    {
      id: 1,
      author: "Validator_0x2",
      type: "update",
      content: "✅ Migrasi ke consensus layer v3.1.0 selesai tanpa downtime. Metrics stabil.",
      image: null,
      timestamp: Date.now() - 7200000,
      likes: 12,
      likedByUser: false,
      comments: [
        { author: "Validator_0x4", text: "Nice! Pakai Lighthouse atau Prysm?" }
      ]
    }
  ];

  // === DOM ELEMENTS ===
  const connectBtn = document.getElementById('connectWallet');
  const postContent = document.getElementById('postContent');
  const imageInput = document.getElementById('imageInput');
  const previewImg = document.getElementById('previewImg');
  const publishBtn = document.getElementById('publishBtn');
  const postType = document.getElementById('postType');
  const postsContainer = document.getElementById('postsContainer');
  const repEl = document.getElementById('repScore');
  const postCountEl = document.getElementById('postCount');
  const totalLikesEl = document.getElementById('totalLikes');

  // === WALLET CONNECTION (Placeholder) ===
  connectBtn.addEventListener('click', async () => {
    if (!window.ethereum) {
      alert("Install MetaMask atau wallet Web3 lain!");
      return;
    }
    try {
      // Nanti diganti dengan: await window.ethereum.request({ method: 'eth_requestAccounts' });
      currentUser.address = "0xABC...123";
      connectBtn.textContent = "🟢 0xABC...123";
      connectBtn.disabled = true;
      alert("Wallet terhubung! (Mode Simulasi)");
    } catch (err) {
      console.error(err);
    }
  });

  // === IMAGE PREVIEW ===
  imageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // === PUBLISH POST ===
  publishBtn.addEventListener('click', () => {
    const content = postContent.value.trim();
    if (!content) return alert("Isi konten dulu!");

    const newPost = {
      id: posts.length + 1,
      author: currentUser.address ? "Validator_You" : "Validator_0x1",
      type: postType.value,
      content: content,
      image: previewImg.style.display !== 'none' ? previewImg.src : null,
      timestamp: Date.now(),
      likes: 0,
      likedByUser: false,
      comments: []
    };

    posts.unshift(newPost);
    
    // Reset form
    postContent.value = '';
    previewImg.style.display = 'none';
    previewImg.src = '';
    imageInput.value = '';

    currentUser.posts++;
    postCountEl.textContent = currentUser.posts;
    renderPosts();

    // 🔄 INTEGRASI SMART CONTRACT NANTI DI SINI:
    // const tx = await contract.createPost(content, ipfsHash, postType.value);
    // await tx.wait();
  });

  // === RENDER POSTS ===
  function renderPosts() {
    postsContainer.innerHTML = '';
    posts.forEach(post => {
      const timeAgo = getTimeAgo(post.timestamp);
      const badgeClass = post.type;
      const badgeText = { update: "📢 Update", achievement: "🏆 Achievement", incident: "⚠️ Incident", discussion: "💬 Diskusi" }[post.type];

      const html = `
        <div class="post-card" data-id="${post.id}">
          <div class="post-header">
            <span class="post-author">${post.author}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
            <span class="post-time">${timeAgo}</span>
          </div>
          <div class="post-content">${post.content}</div>
          ${post.image ? `<img src="${post.image}" class="post-image" alt="Post media">` : ''}
          <div class="post-actions">
            <div class="action-btn ${post.likedByUser ? 'liked' : ''}" onclick="toggleLike(${post.id})">
              <span>${post.likedByUser ? '❤️' : '🤍'}</span> ${post.likes} Like
            </div>
            <div class="action-btn" onclick="toggleComments(${post.id})">
              💬 ${post.comments.length} Komentar
            </div>
          </div>
          <div class="comments-section" id="comments-${post.id}">
            ${post.comments.map(c => `<div class="comment"><strong>${c.author}:</strong> ${c.text}</div>`).join('')}
            <input type="text" class="comment-input" placeholder="Tulis komentar..." onkeydown="addComment(event, ${post.id})">
          </div>
        </div>
      `;
      postsContainer.insertAdjacentHTML('beforeend', html);
    });
  }

  // === INTERAKSI: LIKE ===
  window.toggleLike = (id) => {
    const post = posts.find(p => p.id === id);
    if (!post) return;

    post.likedByUser = !post.likedByUser;
    post.likes += post.likedByUser ? 1 : -1;
    if (post.likedByUser) currentUser.likes++;
    else currentUser.likes--;
    totalLikesEl.textContent = currentUser.likes;

    // 🔄 INTEGRASI CONTRACT: await contract.likePost(id);
    renderPosts();
  };

  // === INTERAKSI: COMMENTS ===
  window.toggleComments = (id) => {
    const el = document.getElementById(`comments-${id}`);
    el.classList.toggle('show');
  };

  window.addComment = (e, id) => {
    if (e.key !== 'Enter') return;
    const input = e.target;
    const text = input.value.trim();
    if (!text) return;

    const post = posts.find(p => p.id === id);
    post.comments.push({ author: "Validator_You", text: text });
    input.value = '';
    renderPosts();

    // 🔄 INTEGRASI CONTRACT: await contract.addComment(id, text);
  };

  // === UTILS ===
  function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "Baru saja";
    if (mins < 60) return `${mins} menit lalu`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} jam lalu`;
    return `${Math.floor(hrs / 24)} hari lalu`;
  }

  // INIT
  renderPosts();
</script>

</body>
</html>
